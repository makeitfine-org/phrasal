spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:25432/phrasaldb}
    username: ${DATABASE_USER:phrasaluser}
    password: ${DATABASE_PASSWORD:phrasalpass}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2

  jpa:
    show-sql: false

  flyway:
    enabled: true

server:
  port: ${SERVER_PORT:28080}

logging:
  level:
    net.phrasal: INFO
    org.hibernate.SQL: WARN
