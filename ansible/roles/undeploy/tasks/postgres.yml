---
- name: Drop database
  become: true
  become_user: postgres
  community.postgresql.postgresql_db:
    name: "{{ db_name }}"
    state: absent
  ignore_errors: true

- name: Drop database user
  become: true
  become_user: postgres
  community.postgresql.postgresql_user:
    name: "{{ db_user }}"
    state: absent
  ignore_errors: true

- name: Stop and disable PostgreSQL
  ansible.builtin.systemd:
    name: postgresql
    state: stopped
    enabled: false
