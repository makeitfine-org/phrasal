---
- name: Check if swap file exists
  ansible.builtin.stat:
    path: /swapfile
  register: swap_file

- name: Ask whether to create swap
  ansible.builtin.pause:
    prompt: "Create swap memory? (yes/no) [no]"
  register: swap_prompt
  when: not swap_file.stat.exists and not (setup_swap | bool)

- name: Set swap decision from prompt
  ansible.builtin.set_fact:
    setup_swap: "{{ swap_prompt.user_input | default('no') | bool }}"
  when: swap_prompt is not skipped

- name: Ask swap size
  ansible.builtin.pause:
    prompt: "Swap size (e.g. 1G, 2G, 4G) [1G]"
  register: size_prompt
  when: not swap_file.stat.exists and (setup_swap | bool)

- name: Set swap size from prompt
  ansible.builtin.set_fact:
    swap_size: "{{ size_prompt.user_input | default('1G', true) }}"
  when: size_prompt is not skipped

- name: Create swap file
  ansible.builtin.command: fallocate -l {{ swap_size }} /swapfile
  when: not swap_file.stat.exists and (setup_swap | bool)

- name: Set swap file permissions
  ansible.builtin.file:
    path: /swapfile
    mode: "0600"
  when: not swap_file.stat.exists and (setup_swap | bool)

- name: Format swap file
  ansible.builtin.command: mkswap /swapfile
  when: not swap_file.stat.exists and (setup_swap | bool)

- name: Enable swap
  ansible.builtin.command: swapon /swapfile
  when: not swap_file.stat.exists and (setup_swap | bool)

- name: Add swap to fstab
  ansible.builtin.lineinfile:
    path: /etc/fstab
    line: "/swapfile none swap sw 0 0"
    state: present
  when: setup_swap | bool
