---
- name: Create k3s config directory
  ansible.builtin.file:
    path: "{{ k3s_config_dir }}"
    state: directory
    mode: "0755"

- name: Deploy k3s config
  ansible.builtin.template:
    src: config.yaml.j2
    dest: "{{ k3s_config_dir }}/config.yaml"
    mode: "0644"
  notify: restart k3s

- name: Install k3s
  ansible.builtin.shell: |
    curl -sfL {{ k3s_install_url }} | INSTALL_K3S_VERSION={{ k3s_version }} sh -
  args:
    creates: /usr/local/bin/k3s

- name: Wait for k3s to be ready
  ansible.builtin.command: k3s kubectl get nodes
  register: k3s_nodes
  retries: 10
  delay: 5
  until: k3s_nodes.rc == 0
  changed_when: false

- name: Create .kube directory for {{ ansible_user }}
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/.kube"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0700"

- name: Copy kubeconfig for {{ ansible_user }}
  ansible.builtin.copy:
    src: /etc/rancher/k3s/k3s.yaml
    dest: "/home/{{ ansible_user }}/.kube/config"
    remote_src: true
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"
  notify: restart k3s

- name: Add KUBECONFIG to bashrc
  ansible.builtin.lineinfile:
    path: "/home/{{ ansible_user }}/.bashrc"
    line: 'export KUBECONFIG=$HOME/.kube/config'
    regexp: '^export KUBECONFIG='
    state: present

- name: Add kubectl alias to bashrc
  ansible.builtin.lineinfile:
    path: "/home/{{ ansible_user }}/.bashrc"
    line: 'alias k="kubectl"'
    regexp: '^alias k='
    state: present
  when: false

- name: Verify k3s installation
  ansible.builtin.command: k3s kubectl get nodes -o wide
  register: k3s_verify
  changed_when: false

- name: Deploy kubectl bash completion
  ansible.builtin.copy:
    src: k8s-completion
    dest: /etc/bash_completion.d/k8s-completion
    mode: "0644"
    force: false
  tags: [k8s-completion]

- name: Allow external access to K8s API (port 6443)
  ansible.builtin.iptables:
    chain: INPUT
    protocol: tcp
    destination_port: "6443"
    jump: ACCEPT
    action: append
  tags: [allow_6443]

- name: Show cluster status
  ansible.builtin.debug:
    msg: "{{ k3s_verify.stdout_lines }}"
