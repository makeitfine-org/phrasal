---
# Infrastructure + first deploy (run once)
#   ansible-playbook playbooks/setup.yml
#   ansible-playbook playbooks/setup.yml -e setup_swap=true -e swap_size=2G
#   ansible-playbook playbooks/setup.yml --tags postgres,java  (partial)

- name: Install infrastructure and deploy application
  hosts: hetzner1
  become: true
  vars_prompt:
    - name: setup_swap
      prompt: "Create swap memory? (yes/no)"
      default: "no"
      private: false
    - name: swap_size
      prompt: "Swap size (e.g. 1G, 2G, 4G)"
      default: "1G"
      private: false
  roles:
    - role: infra
      tags: [infra]
    - role: deploy
      tags: [deploy]
