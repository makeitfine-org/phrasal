---
# 3.init_soft.sh equivalent — speedtest, tmux

- name: Install speedtest-cli
  ansible.builtin.apt:
    name: speedtest-cli
    state: present

- name: Install tmux
  ansible.builtin.apt:
    name: tmux
    state: present

- name: Deploy tmux config
  ansible.builtin.template:
    src: tmux.conf.j2
    dest: "/home/{{ vps_user }}/.tmux.conf"
    owner: "{{ vps_user }}"
    group: "{{ vps_user }}"
    mode: "0644"
