---
- name: Check nginx config exists
  ansible.builtin.stat:
    path: /etc/nginx/sites-available/phrasal
  register: nginx_config

- name: Fail if frontend not set up
  ansible.builtin.fail:
    msg: "Frontend not deployed — run setup.yml first"
  when: not nginx_config.stat.exists

- name: Check local dist directory
  ansible.builtin.stat:
    path: "{{ local_dist_dir }}"
  delegate_to: localhost
  become: false
  register: dist_dir

- name: Fail if no dist
  ansible.builtin.fail:
    msg: "No dist/ directory — build first: npm run build"
  when: not dist_dir.stat.exists

- name: Upload frontend files
  ansible.builtin.synchronize:
    src: "{{ local_dist_dir }}/"
    dest: "{{ web_dir }}/"
    delete: true
  notify: reload nginx
