---
# 1.init-user.sh equivalent — create vpsuser with SSH key and passwordless sudo
# Run against root: ansible-playbook playbooks/init.yml -e ansible_user=root --tags user

- name: Create {{ vps_user }}
  ansible.builtin.user:
    name: "{{ vps_user }}"
    shell: /bin/bash
    create_home: true

- name: Grant passwordless sudo
  ansible.builtin.copy:
    content: "{{ vps_user }} ALL=(ALL) NOPASSWD:ALL"
    dest: "/etc/sudoers.d/{{ vps_user }}"
    mode: "0440"

- name: Copy root authorized_keys to {{ vps_user }}
  ansible.builtin.copy:
    src: /root/.ssh/authorized_keys
    dest: "/home/{{ vps_user }}/.ssh/authorized_keys"
    remote_src: true
    owner: "{{ vps_user }}"
    group: "{{ vps_user }}"
    mode: "0600"

- name: Ensure .ssh directory permissions
  ansible.builtin.file:
    path: "/home/{{ vps_user }}/.ssh"
    state: directory
    owner: "{{ vps_user }}"
    group: "{{ vps_user }}"
    mode: "0700"

- name: Verify {{ vps_user }} can sudo
  ansible.builtin.command: sudo whoami
  become: false
  become_user: "{{ vps_user }}"
  changed_when: false
