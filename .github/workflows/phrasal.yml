name: Phrasal CI

on:
  push:
    paths:
      - 'phrasal/**'
      - '.github/workflows/phrasal.yml'
  pull_request:
    paths:
      - 'phrasal/**'
      - '.github/workflows/phrasal.yml'

jobs:
  ci:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: phrasal/package-lock.json

      - name: Install dependencies
        working-directory: phrasal
        run: npm install

      - name: Run tests
        working-directory: phrasal
        run: npm run test:run

      - name: Build
        working-directory: phrasal
        run: npm run build
