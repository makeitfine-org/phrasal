name: CI/CD

on:
  push:
    branches: [ "**" ]
    tags: [ 'v[0-9]+.[0-9]+.[0-9]+' ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - name: Clean old artifacts
        # if: false # disable
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/actions/artifacts \
            --paginate --jq '.artifacts[].id' | \
          xargs -I{} gh api -X DELETE \
            repos/${{ github.repository }}/actions/artifacts/{} 2>/dev/null || true

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and verify
        env:
          MAVEN_OPTS: -Xmx3200m
        run: mvn -f backend/pom.xml clean verify

      - name: Generate JaCoCo report
        run: mvn -f backend/pom.xml jacoco:report

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-report
          path: backend/target/site/jacoco/
          retention-days: 3

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: backend/target/surefire-reports/
          retention-days: 3

      - name: Upload application JAR
        uses: actions/upload-artifact@v7
        with:
          name: app-jar
          path: backend/target/backend-*.jar
          retention-days: 3

  frontend-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js 26
        uses: actions/setup-node@v5
        with:
          node-version: '26.3.1'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm --prefix frontend ci

      - name: Build frontend
        run: npm --prefix frontend run build

      - name: Run tests
        run: npm --prefix frontend run test:run

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [build-and-test, frontend-test]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js 26
        uses: actions/setup-node@v5
        with:
          node-version: '26.3.1'
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json

      - name: Install e2e dependencies
        run: npm --prefix e2e ci

      - name: Install Playwright browsers
        run: npx --prefix e2e playwright install --with-deps chromium

      - name: Download application JAR
        uses: actions/download-artifact@v7
        with:
          name: app-jar
          path: backend/target/

      - name: Start stack
        run: docker compose up -d --wait
        timeout-minutes: 5
        env:
          COMPOSE_PROJECT_NAME: phrasal-ci # not necessary in CI

      - name: Run e2e tests
        run: npm --prefix e2e test
        env:
          E2E_MANAGE_STACK: "0"
          FRONTEND_PORT: "3000"
          BACKEND_PORT: "8080"
          POSTGRES_PORT: "5432"
          DB_HOST: localhost
          DB_NAME: phrasaldb
          DB_USER: postgres
          DB_PASSWORD: postgres

      - name: Upload Cucumber report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cucumber-report
          path: e2e/reports/
          retention-days: 3

  docker-push:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [e2e]
    steps:
      - uses: actions/checkout@v5

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/phrasal-backend:${{ steps.version.outputs.VERSION }}
            ${{ secrets.DOCKER_USERNAME }}/phrasal-backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/phrasal-frontend:${{ steps.version.outputs.VERSION }}
            ${{ secrets.DOCKER_USERNAME }}/phrasal-frontend:latest
            



  deploy:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [docker-push]
    environment: production
    steps:
      - uses: actions/checkout@v5

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Set up kubectl
        uses: azure/setup-kubectl@v5

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          printf '%s' "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Generate prod secret patch
        env:
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          printf '%s\n' \
            "apiVersion: v1" \
            "kind: Secret" \
            "metadata:" \
            "  name: app-secrets" \
            "type: Opaque" \
            "stringData:" \
            "  database.username: ${DB_USERNAME}" \
            "  database.password: ${DB_PASSWORD}" \
            > k8s/overlays/prod/patches/secret.yaml

      - name: Set image tags
        working-directory: k8s/overlays/prod
        run: |
          kustomize edit set image \
            ${{ secrets.DOCKER_USERNAME }}/phrasal-backend=${{ secrets.DOCKER_USERNAME }}/phrasal-backend:${{ steps.version.outputs.VERSION }} \
            ${{ secrets.DOCKER_USERNAME }}/phrasal-frontend=${{ secrets.DOCKER_USERNAME }}/phrasal-frontend:${{ steps.version.outputs.VERSION }}

      - name: Deploy to K3s
        run: kubectl apply -k k8s/overlays/prod

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend --timeout=120s
          kubectl rollout status deployment/phrasal-frontend --timeout=120s

      - name: Verify deployment
        run: kubectl get pods -o wide
