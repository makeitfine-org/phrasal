name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and verify
        env:
          MAVEN_OPTS: -Xmx3200m
        run: mvn -f backend/pom.xml clean verify

      - name: Generate JaCoCo report
        run: mvn -f backend/pom.xml jacoco:report

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: backend/target/site/jacoco/

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: backend/target/surefire-reports/

      - name: Upload application JAR
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: backend/target/backend-*.jar

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm --prefix frontend ci

      - name: Build frontend
        run: npm --prefix frontend run build

      - name: Run tests
        run: npm --prefix frontend run test:run

  e2e:
    runs-on: ubuntu-latest
    needs: [build-and-test, frontend-test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json

      - name: Install e2e dependencies
        run: npm --prefix e2e ci

      - name: Install Playwright browsers
        run: npx --prefix e2e playwright install --with-deps chromium

      - name: Download application JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: backend/target/

      - name: Start stack
        run: docker compose up -d --wait
        timeout-minutes: 5

      - name: Run e2e tests
        run: npm --prefix e2e test
        env:
          E2E_MANAGE_STACK: "0"
          FRONTEND_URL: http://localhost:3000
          API_BASE_URL: http://localhost:8080
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_NAME: phrasaldb
          DB_USER: postgres
          DB_PASSWORD: postgres

      - name: Upload Cucumber report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report
          path: e2e/reports/

  docker-build:
    if: false
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Download application JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: backend/target/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/phrasal-backend:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/phrasal-backend:latest
