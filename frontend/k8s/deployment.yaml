apiVersion: apps/v1
kind: Deployment
metadata:
  name: phrasal-frontend
  labels:
    app: phrasal-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: phrasal-frontend
  template:
    metadata:
      labels:
        app: phrasal-frontend
    spec:
      containers:
      - name: frontend
        image: phrasal-frontend
        ports:
        - containerPort: 80
          name: http
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
      volumes:
      - name: nginx-config
        configMap:
          name: frontend-nginx-config
      restartPolicy: Always
