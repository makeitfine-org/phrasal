apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: phrasal-frontend

build:
  artifacts:
    - image: phrasal-frontend
      docker:
        dockerfile: Dockerfile
  local:
    push: false
    useBuildkit: true

manifests:
  rawYaml:
    - k8s/configmap.yaml
    - k8s/deployment.yaml
    - k8s/service.yaml

deploy:
  kubectl: {}

portForward:
  - resourceType: service
    resourceName: phrasal-frontend
    port: 3000
    localPort: 3000
