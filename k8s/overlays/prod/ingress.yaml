apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: phrasal-ingress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - phrasal.ddns.net
      secretName: phrasal-tls
  rules:
    - host: phrasal.ddns.net
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: phrasal-frontend
                port:
                  number: 3000
