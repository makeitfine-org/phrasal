apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - ingress.yaml

replicas:
  - name: backend
    count: 1
  - name: phrasal-frontend
    count: 1

images:
  - name: backend
    newName: stingion/phrasal-backend
    newTag: latest
  - name: phrasal-frontend
    newName: stingion/phrasal-frontend
    newTag: latest

patches:
  - path: patches/backend-service.yaml
  - path: patches/frontend-service.yaml
  - path: patches/backend-configmap.yaml
  - path: patches/secret.yaml
