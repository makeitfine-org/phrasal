apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  labels:
    app: backend
type: Opaque
stringData:
  # DEV-ONLY defaults — production credentials are injected via
  # k8s/overlays/prod/patches/secret.yaml generated from GitHub Secrets
  # (DB_USERNAME / DB_PASSWORD) during the deploy workflow.
  # TODO: rotate prod credentials if still using postgres/postgres defaults.
  database.username: postgres
  database.password: postgres
