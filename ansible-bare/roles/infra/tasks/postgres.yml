---
- name: Install PostgreSQL
  ansible.builtin.apt:
    name:
      - postgresql
      - postgresql-client
      - python3-psycopg2
    state: present
    update_cache: true

- name: Find postgresql.conf
  ansible.builtin.find:
    paths: /etc/postgresql
    patterns: postgresql.conf
    recurse: true
  register: pg_conf_files

- name: Find pg_hba.conf
  ansible.builtin.find:
    paths: /etc/postgresql
    patterns: pg_hba.conf
    recurse: true
  register: pg_hba_files

- name: Set PostgreSQL port
  ansible.builtin.lineinfile:
    path: "{{ item.path }}"
    regexp: "^#?port\\s*="
    line: "port = {{ postgres_port }}"
  loop: "{{ pg_conf_files.files }}"
  notify: restart postgresql

- name: Listen on all interfaces
  ansible.builtin.lineinfile:
    path: "{{ item.path }}"
    regexp: "^#?listen_addresses"
    line: "listen_addresses = {{ postgres_listen_addresses }}"
  loop: "{{ pg_conf_files.files }}"
  notify: restart postgresql

- name: Allow remote connections with password auth
  ansible.builtin.lineinfile:
    path: "{{ item.path }}"
    line: "host all all 0.0.0.0/0 md5"
    state: present
  loop: "{{ pg_hba_files.files }}"
  notify: restart postgresql
