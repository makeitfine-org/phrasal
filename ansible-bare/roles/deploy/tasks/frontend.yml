---
- name: Create web directory
  ansible.builtin.file:
    path: "{{ web_dir }}"
    state: directory
    owner: "{{ vps_user }}"
    group: "{{ vps_user }}"
    mode: "0755"

- name: Check local dist directory
  ansible.builtin.stat:
    path: "{{ local_dist_dir }}"
  delegate_to: localhost
  become: false
  register: dist_dir

- name: Fail if no dist
  ansible.builtin.fail:
    msg: "No dist/ directory — build first: npm run build"
  when: "not dist_dir.stat.exists"

- name: Upload frontend files
  ansible.builtin.synchronize:
    src: "{{ local_dist_dir }}/"
    dest: "{{ web_dir }}/"
    delete: true

- name: Check if full nginx site config exists
  ansible.builtin.command: grep -q 'root {{ web_dir }}' /etc/nginx/sites-available/phrasal
  register: nginx_has_root
  changed_when: false
  failed_when: false

- name: Deploy nginx site config
  ansible.builtin.template:
    src: phrasal-nginx.conf.j2
    dest: /etc/nginx/sites-available/phrasal
    mode: "0644"
  when: "nginx_has_root.rc != 0"
  notify: reload nginx

- name: Enable nginx site
  ansible.builtin.file:
    src: /etc/nginx/sites-available/phrasal
    dest: /etc/nginx/sites-enabled/phrasal
    state: link
  notify: reload nginx

- name: Check if SSL is configured in nginx
  ansible.builtin.command: grep -q 'listen.*443.*ssl' /etc/nginx/sites-available/phrasal
  register: ssl_configured
  changed_when: false
  failed_when: false

- name: Set up SSL with certbot
  ansible.builtin.command: >
    certbot --nginx -d {{ domain }}
    --non-interactive --agree-tos --email {{ certbot_email }}
  when: "ssl_configured.rc != 0"

- name: Create construction page directory
  ansible.builtin.file:
    path: /var/www/phrasal-construction
    state: directory
    owner: "{{ vps_user }}"
    group: "{{ vps_user }}"
    mode: "0755"
  when: "false"

- name: Deploy construction page
  ansible.builtin.template:
    src: under-construction.html.j2
    dest: /var/www/phrasal-construction/index.html
    mode: "0644"
  when: "false"

- name: Deploy reject config for old domain
  ansible.builtin.template:
    src: phrasal-reject.conf.j2
    dest: /etc/nginx/sites-available/phrasal-reject
    mode: "0644"
  when: "false"
  notify: reload nginx

- name: Enable reject config
  ansible.builtin.file:
    src: /etc/nginx/sites-available/phrasal-reject
    dest: /etc/nginx/sites-enabled/phrasal-reject
    state: link
  when: "false"
  notify: reload nginx
