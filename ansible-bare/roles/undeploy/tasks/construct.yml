---
- name: Remove construct nginx config
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/nginx/sites-enabled/phrasal-construct
    - /etc/nginx/sites-available/phrasal-construct
  notify: reload nginx

- name: Remove construction page
  ansible.builtin.file:
    path: /var/www/phrasal-construction
    state: absent
