---
- name: Remove web directory
  ansible.builtin.file:
    path: "{{ web_dir }}"
    state: absent

- name: Check if backend still deployed
  ansible.builtin.stat:
    path: /etc/systemd/system/phrasal.service
  register: backend_still_deployed

- name: Keep API proxy config if backend still running
  ansible.builtin.template:
    src: api-only-nginx.conf.j2
    dest: /etc/nginx/sites-available/phrasal
    mode: "0644"
  when: "backend_still_deployed.stat.exists"
  notify: reload nginx

- name: Remove nginx config entirely if backend is also gone
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/nginx/sites-enabled/phrasal
    - /etc/nginx/sites-available/phrasal
  when: "not backend_still_deployed.stat.exists"
  notify: reload nginx

