---
# 2.init_bash.sh equivalent — base packages, .bashrc, Telegram secrets

- name: Update and upgrade apt packages
  ansible.builtin.apt:
    update_cache: true
    upgrade: dist
    cache_valid_time: 3600

- name: Install base packages
  ansible.builtin.apt:
    name:
      - vim
      - certbot
      - python3-certbot-nginx
      - net-tools
    state: present

- name: Create secrets directory
  ansible.builtin.file:
    path: "/home/{{ vps_user }}/.secrets.d"
    state: directory
    owner: "{{ vps_user }}"
    group: "{{ vps_user }}"
    mode: "0700"

- name: Deploy secrets.sh (interactive — set telegram_bot_token / telegram_chat_id)
  ansible.builtin.template:
    src: secrets.sh.j2
    dest: "/home/{{ vps_user }}/.secrets.d/secrets.sh"
    owner: "{{ vps_user }}"
    group: "{{ vps_user }}"
    mode: "0600"
    force: false
  when: telegram_bot_token is defined and telegram_chat_id is defined

- name: Remove old .bashrc_ansible if present
  ansible.builtin.file:
    path: "/home/{{ vps_user }}/.bashrc_ansible"
    state: absent

- name: Remove old source line from .bashrc
  ansible.builtin.lineinfile:
    path: "/home/{{ vps_user }}/.bashrc"
    line: "source ~/.bashrc_ansible"
    state: absent

- name: Deploy .bashrc additions
  ansible.builtin.copy:
    src: bashrc.txt
    dest: "/home/{{ vps_user }}/.bashrc_custom"
    owner: "{{ vps_user }}"
    group: "{{ vps_user }}"
    mode: "0644"

- name: Source .bashrc_custom from .bashrc
  ansible.builtin.lineinfile:
    path: "/home/{{ vps_user }}/.bashrc"
    line: "source ~/.bashrc_custom"
    create: true
    owner: "{{ vps_user }}"
    group: "{{ vps_user }}"
